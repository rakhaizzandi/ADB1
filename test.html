<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Landing Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
}

/* Navbar */
nav{
    background:#333;
    color:white;
    display:flex;
    justify-content:space-between;
    padding:15px 50px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

/* Hero */
.hero{
    height:80vh;
    background:linear-gradient(120deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero h1{
    font-size:48px;
}

.hero p{
    margin:15px 0;
}

.hero button{
    padding:10px 20px;
    border:none;
    background:white;
    color:#333;
    cursor:pointer;
    border-radius:5px;
}

/* Features */
.features{
    padding:50px;
    text-align:center;
}

.feature-container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    width:250px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* Footer */
footer{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}
</style>
</head>

<body>

<nav>
    <h2>MyWebsite</h2>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Features</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<section class="hero">
    <div>
        <h1>Welcome to My Website</h1>
        <p>Lah Ini Apaan</p>
        <button>Inilah My</button>
    </div>
</section>

<section class="features">
    <h2>Our Features</h2>
    <div class="feature-container">

        <div class="card">
            <h3>Fast</h3>
            <p>Ini Website</p>
        </div>

        <div class="card">
            <h3>Responsive</h3>
            <p></p>
        </div>

        <div class="card">
            <h3>Modern</h3>
            <p>Desain minimalis dan mudah dikembangkan.</p>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 MyWebsite | All Rights Reserved</p>
</footer>

</body>
</html>
